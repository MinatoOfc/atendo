<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entrar — Atendo</title>
<link rel="stylesheet" href="/theme.css" />
</head>
<body>
<a href="/" class="auth-back">← Voltar</a>
<div class="auth-wrap">
  <div class="auth-card">
    <a href="/" class="logo"><span class="logo-mark">◈</span> Atendo</a>
    <h1>Bem-vindo de volta</h1>
    <p class="subtitle">Entre para acessar seu painel</p>

    <form id="form" novalidate>
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="voce@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Sua senha" autocomplete="current-password" />
      </div>
      <div class="auth-msg" id="msg"></div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit">Entrar</button>
    </form>

    <div class="auth-foot">Não tem conta? <a href="/signup">Criar grátis</a></div>
  </div>
</div>

<script>
(function(){
  var form = document.getElementById('form');
  var msg = document.getElementById('msg');
  var btn = document.getElementById('submit');

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    msg.className = 'auth-msg';
    if(!email || !password){ return fail('Preencha e-mail e senha.'); }

    btn.disabled = true; btn.textContent = 'Entrando...';
    try{
      var r = await fetch('/api/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      var data = await r.json();
      if(!r.ok){ btn.disabled=false; btn.textContent='Entrar'; return fail(data.error || 'Erro ao entrar.'); }
      location.href = '/app';
    }catch(err){
      btn.disabled=false; btn.textContent='Entrar';
      fail('Falha de conexão. Tente novamente.');
    }
  });
  function fail(t){ msg.className='auth-msg bad'; msg.textContent=t; }
})();
</script>
</body>
</html>
